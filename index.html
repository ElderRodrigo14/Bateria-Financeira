<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Battery - App</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --card-color: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #8e918f;
            --md-green: #a7f3d0;
            --md-yellow: #fef08a;
            --md-red: #fecaca;
            --btn-primary: #a8c7fa;
            --border-radius: 28px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* --- TOP BAR --- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: rgba(19, 19, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #333;
        }

        .topbar h1 { font-size: 1.3rem; font-weight: 500; }
        
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .icon-btn:active { background: #333; }

        /* --- MAIN CONTENT --- */
        .main-content { padding: 20px; display: flex; flex-direction: column; gap: 24px; }

        /* --- CARDS --- */
        .card {
            background-color: var(--card-color);
            border-radius: var(--border-radius);
            padding: 24px;
            border: 1px solid #3c4043;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Campos Editáveis Seamless (Invisíveis até focar) */
        .seamless-input {
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            text-align: center;
            outline: none;
            width: 100%;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.2s;
        }
        .seamless-input:focus { border-bottom: 1px dashed var(--btn-primary); }
        
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; color: var(--text-primary); }
        .card-date { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; }

        /* --- BATERIA VISUAL (Padrão Arredondado) --- */
        .battery-container { position: relative; width: 90px; height: 180px; margin-bottom: 20px; }
        .battery-head {
            position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 28px; height: 12px; background: #444746; border-radius: 6px 6px 0 0;
        }
        .battery-body {
            width: 100%; height: 100%; border: 3px solid #444746; border-radius: 25px;
            padding: 5px; display: flex; align-items: flex-end; background-color: #131314;
        }
        .battery-level {
            width: 100%; border-radius: 18px; transition: height 0.5s ease, background-color 0.5s ease;
        }
        .percentage-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-weight: 700; font-size: 1.5rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
