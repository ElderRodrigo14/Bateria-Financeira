<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Battery - Pro V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --card-color: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #8e918f;
            --md-green: #a7f3d0;
            --md-yellow: #fef08a;
            --md-red: #fecaca;
            --btn-primary: #a8c7fa;
            --border-radius: 28px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

        /* Barra Superior */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; background: rgba(19, 19, 20, 0.85); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333;
        }

        .main-content { padding: 20px; display: flex; flex-direction: column; gap: 24px; max-width: 500px; margin: 0 auto; }

        /* Card Principal */
        .card {
            background-color: var(--card-color); border-radius: var(--border-radius);
            padding: 24px; border: 1px solid #3c4043; display: flex; flex-direction: column; align-items: center;
            transition: all 0.3s;
        }

        /* Alerta de Bateria Fraca (Sugestão 3) */
        .critical { 
            border-color: #f28b82 !important; 
            box-shadow: 0 0 20px rgba(242, 139, 130, 0.2);
            animation: shake 0.5s ease-in-out infinite alternate;
        }
        @keyframes shake { from { transform: translateX(-1px); } to { transform: translateX(1px); } }

        .seamless-input {
            background: transparent; border: none; color: inherit; font-family: inherit;
            text-align: center; outline: none; width: 100%; border-bottom: 1px dashed transparent;
        }
        .seamless-input:focus { border-bottom: 1px dashed var(--btn-primary); }
        
        /* Bateria */
        .battery-container { position: relative; width: 80px; height: 160px; margin-bottom: 15px; }
        .battery-head { width: 24px; height: 8px; background: #444746; margin: 0 auto; border-radius: 4px 4px 0 0; }
        .battery-body {
            width: 100%; height: 100%; border: 3px solid #444746; border-radius: 20px;
            padding: 4px; display: flex; align-items: flex-end; background: #131314; position: relative;
        }
        .battery-level { width: 100%; border-radius: 14px; transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .percentage-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-weight: 700; font-size: 1.3rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Seletor de Categorias (Sugestão 2) */
        .category-selector { display: flex; gap: 8px; margin-bottom: 10px; width: 100%; overflow-x: auto; padding-bottom: 5px; }
        .cat-btn { 
            background: #2a2b2e; border: 1px solid #444; border-radius: 12px; padding: 8px 12px; 
            cursor: pointer; font-size: 1.2rem; transition: 0.2s;
        }
        .cat-btn.active { background: var(--btn-primary); border-color: var(--btn-primary); transform: scale(1.1); }

        .action-row { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
        .expense-input {
            flex: 1; padding: 14px; border-radius: 16px; border: 1px solid #444; background: #2a2b2e;
            color: white; font-size: 1rem; outline: none;
        }
        .btn-add {
            background: var(--btn-primary); color: #062e6f; border: none; border-radius: 16px;
            padding: 0 20px; font-weight: 700; font-size: 1.5rem; cursor: pointer;
        }

        /* Histórico */
        .history-section { width: 100%; border-top: 1px solid #333; padding-top: 15px; }
        .history-header { display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.9rem; cursor: pointer; }
        .history-list { max-height: 0; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
