<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Battery - Pro v6</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --card-color: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #8e918f;
            --md-green: #a7f3d0;
            --md-yellow: #fef08a;
            --md-red: #fecaca;
            --btn-primary: #a8c7fa;
            --border-radius: 28px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; background: rgba(19, 19, 20, 0.85); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333;
        }

        .main-content { padding: 20px; display: flex; flex-direction: column; gap: 24px; max-width: 500px; margin: 0 auto; }

        .card {
            background-color: var(--card-color); border-radius: var(--border-radius);
            padding: 24px; border: 1px solid #3c4043; display: flex; flex-direction: column; align-items: center;
            transition: all 0.3s; position: relative;
        }

        /* Alerta de Bateria Fraca */
        .critical { 
            border-color: #f28b82 !important; 
            box-shadow: 0 0 20px rgba(242, 139, 130, 0.3);
            animation: shake 0.4s ease-in-out infinite alternate;
        }
